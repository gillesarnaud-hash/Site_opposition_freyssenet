<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Freyssenet Ensemble — Opposition municipale</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Fraunces:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Public+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* Freyssenet Ensemble — site CSS */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--fs-body, 'Public Sans', system-ui, sans-serif);
  font-size: 16px;
  line-height: 1.55;
  color: var(--c-ink, #1a1a1a);
  background: var(--c-paper, #fafaf7);
  -webkit-font-smoothing: antialiased;
}
img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; }
a { text-decoration: none; color: inherit; cursor: pointer; }

.site { min-height: 100vh; }

/* ───── Header ───── */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--c-paper);
  border-bottom: 1px solid rgba(0,0,0,.08);
  backdrop-filter: blur(12px);
}
.site-header__inner {
  max-width: 1280px; margin: 0 auto;
  padding: 14px 32px;
  display: flex; align-items: center; gap: 32px;
}
.site-brand { display: flex; align-items: center; gap: 12px; }
.site-brand__mark {
  width: 40px; height: 40px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--c-paper); font-size: 22px; font-weight: 600;
}
.brand-mark { display: block; flex-shrink: 0; }
.site-brand__name { font-size: 19px; font-weight: 500; line-height: 1.1; letter-spacing: -.01em; }
.site-brand__sub { font-size: 11px; opacity: .55; letter-spacing: .04em; text-transform: uppercase; margin-top: 2px; }

.site-nav { flex: 1; display: flex; gap: 4px; justify-content: center; }
.site-nav__item {
  position: relative;
  background: transparent; border: 0;
  padding: 8px 14px;
  font-size: 14px; font-weight: 500;
  color: rgba(0,0,0,.7);
  border-radius: 4px;
  transition: color .15s;
}
.site-nav__item:hover { color: var(--c-ink); background: rgba(0,0,0,.04); }
.site-nav__item.is-active { color: var(--c-primary); }
.site-nav__bar {
  position: absolute; bottom: -16px; left: 14px; right: 14px;
  height: 2px;
}
.site-cta {
  border: 0; padding: 10px 18px;
  font-size: 13px; font-weight: 600;
  border-radius: 4px;
  letter-spacing: .01em;
}

/* ───── Hero ───── */
.hero {
  max-width: 1280px; margin: 0 auto;
  padding: 64px 32px 48px;
}
.hero__grid {
  display: grid; grid-template-columns: 1.15fr 1fr; gap: 56px; align-items: center;
}
.hero__eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 12px; letter-spacing: .08em; text-transform: uppercase; font-weight: 600;
  margin-bottom: 24px;
}
.hero__pulse {
  width: 8px; height: 8px; border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}
.hero__title {
  font-size: clamp(40px, 5vw, 68px);
  line-height: 1.02;
  font-weight: 400;
  letter-spacing: -.02em;
  margin: 0 0 24px;
  text-wrap: balance;
}
.hero__lead {
  font-size: 18px; line-height: 1.55;
  opacity: .75; max-width: 520px;
  margin: 0 0 32px;
  text-wrap: pretty;
}
.hero__cta { display: flex; gap: 12px; margin-bottom: 48px; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  border: 0; padding: 14px 22px;
  font-size: 14px; font-weight: 600;
  border-radius: 4px;
  letter-spacing: .01em;
  transition: transform .12s, box-shadow .12s;
}
.btn:hover { transform: translateY(-1px); }
.btn--primary { color: #fff; }
.btn--ghost {
  background: transparent;
  border: 1px solid rgba(0,0,0,.2);
  color: var(--c-ink);
}
.btn--ghost:hover { background: rgba(0,0,0,.04); }

.hero__stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border-top: 1px solid rgba(0,0,0,.1);
  padding-top: 24px;
}
.stat { padding-right: 16px; border-right: 1px solid rgba(0,0,0,.08); }
.stat:last-child { border-right: 0; }
.stat__n { font-size: 36px; font-weight: 400; line-height: 1; letter-spacing: -.02em; }
.stat__l { font-size: 12px; opacity: .6; margin-top: 6px; line-height: 1.3; }

.hero__right { display: flex; flex-direction: column; gap: 16px; }
.hero__photo {
  aspect-ratio: 4/3;
  background: rgba(0,0,0,.04);
  overflow: hidden;
  border: 1px solid rgba(0,0,0,.08);
}
.hero__photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: sepia(0.08) contrast(1.02);
}
.hero__caption {
  font-style: italic; font-size: 14px; opacity: .75;
  padding-left: 16px; border-left: 2px solid var(--c-primary);
  line-height: 1.5;
}

/* ───── Placeholders ───── */
.placeholder {
  width: 100%; height: 100%; min-height: 200px;
  background-image: repeating-linear-gradient(
    -45deg,
    rgba(0,0,0,.04) 0, rgba(0,0,0,.04) 1px,
    transparent 1px, transparent 12px
  );
  background-color: rgba(0,0,0,.02);
  border: 1px solid rgba(0,0,0,.08);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.placeholder--wide { aspect-ratio: 16/7; }
.placeholder--square { aspect-ratio: 1; }
.placeholder--portrait { aspect-ratio: 3/4; }
.placeholder__label {
  font-family: ui-monospace, 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: .02em;
  color: rgba(0,0,0,.45);
  background: var(--c-paper);
  padding: 4px 10px; border-radius: 2px;
  text-align: center; max-width: 80%;
}

/* ───── Section title ───── */
.sect-title { margin-bottom: 40px; }
.sect-title__kicker {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 16px;
}
.sect-title__line { width: 32px; height: 2px; }
.sect-title h2 {
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 400; line-height: 1.05;
  letter-spacing: -.02em;
  margin: 0; max-width: 900px;
  text-wrap: balance;
}

/* ───── Cards (generic) ───── */
.card {
  background: var(--card-bg, transparent);
  border: var(--card-border, 1px solid rgba(0,0,0,.1));
  box-shadow: var(--card-shadow, none);
  border-radius: 4px;
  padding: 24px;
  transition: transform .15s, box-shadow .15s;
}

/* ───── Actus ───── */
.actus { max-width: 1280px; margin: 0 auto; padding: 64px 32px; border-top: 1px solid rgba(0,0,0,.08); }
.actus__grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 20px;
}
.actu { display: flex; flex-direction: column; gap: 12px; }
.actu--featured {
  grid-row: span 2;
  display: flex; flex-direction: column;
}
.actu__meta { display: flex; align-items: center; gap: 12px; font-size: 12px; }
.actu__tag {
  border: 1px solid; padding: 3px 8px; border-radius: 2px;
  font-weight: 600; letter-spacing: .04em; text-transform: uppercase; font-size: 10px;
}
.actu__date { opacity: .55; }
.actu h3 {
  font-size: 22px; font-weight: 400; line-height: 1.2;
  letter-spacing: -.01em; margin: 0;
}
.actu--featured h3 { font-size: 32px; }
.actu p { font-size: 14px; opacity: .72; margin: 0; line-height: 1.55; }
.actu__more { font-size: 13px; font-weight: 600; margin-top: auto; }
.actu__hero { aspect-ratio: 16/9; margin-top: 16px; }

/* ───── Bilan KPI ───── */
.bilan { max-width: 1280px; margin: 0 auto; padding: 80px 32px; border-top: 1px solid rgba(0,0,0,.08); }
.bilan__intro { font-size: 17px; max-width: 800px; line-height: 1.6; opacity: .78; margin: 0 0 32px; }

.mandat-switch {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 32px;
  max-width: 760px;
}
.mandat-switch__btn {
  text-align: left;
  padding: 18px 22px;
  background: transparent;
  border: 1.5px solid rgba(0,0,0,.12);
  border-radius: 4px;
  transition: border-color .15s, background .15s;
}
.mandat-switch__btn:hover { background: rgba(0,0,0,.025); }
.mandat-switch__btn.is-active { background: rgba(0,0,0,.025); }
.mandat-switch__l {
  font-size: 18px; font-weight: 400; letter-spacing: -.01em;
  margin-bottom: 4px;
}
.mandat-switch__s { font-size: 12px; opacity: .65; letter-spacing: .02em; }

.bilan__legend {
  display: flex; gap: 24px; flex-wrap: wrap;
  padding: 16px 20px;
  background: rgba(0,0,0,.025);
  border-radius: 4px;
  margin-bottom: 32px;
  font-size: 13px;
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-item span:first-child {
  width: 12px; height: 12px; border-radius: 2px; display: inline-block;
}

.bilan__list { display: flex; flex-direction: column; gap: 16px; }
.kpi-card {
  border: 1px solid rgba(0,0,0,.1);
  border-radius: 4px;
  padding: 28px 32px;
  background: var(--c-paper);
}
.kpi-card__head {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 24px; align-items: start;
  margin-bottom: 20px;
}
.kpi-card__num {
  font-size: 44px; font-weight: 400; line-height: 1;
  letter-spacing: -.03em; opacity: .9;
}
.kpi-card__title h3 {
  font-size: 22px; font-weight: 400; margin: 0 0 4px;
  letter-spacing: -.01em;
}
.kpi-card__title p { font-size: 14px; opacity: .65; margin: 0; font-style: italic; }
.kpi-card__badge {
  border: 1px solid; padding: 6px 12px; border-radius: 2px;
  font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  white-space: nowrap;
}
.kpi-card__detail {
  font-size: 14px; opacity: .72; margin: 16px 0 0; line-height: 1.55;
  padding-top: 16px; border-top: 1px dashed rgba(0,0,0,.1);
}

/* KPI - jauges */
.kpi-gauge { display: flex; flex-direction: column; gap: 10px; }
.kpi-gauge__row {
  display: grid; grid-template-columns: 90px 1fr 60px;
  gap: 16px; align-items: center;
  font-size: 13px; opacity: .85;
}
.kpi-gauge__bar {
  height: 8px; background: rgba(0,0,0,.06); border-radius: 2px; overflow: hidden;
}
.kpi-gauge__bar > div { height: 100%; transition: width .6s; }
.kpi-gauge__val { font-family: ui-monospace, monospace; font-size: 13px; text-align: right; }

/* KPI - notes */
.kpi-note { display: flex; align-items: center; gap: 32px; }
.kpi-note__big {
  font-size: 72px; font-weight: 400; line-height: 1; letter-spacing: -.04em;
}
.kpi-note__big span { font-size: 28px; opacity: .4; }
.kpi-note__bars { display: flex; gap: 4px; flex: 1; }
.kpi-note__bars span { flex: 1; height: 32px; border-radius: 2px; }

/* KPI - feux */
.kpi-feux { display: flex; align-items: center; gap: 16px; padding: 12px 0; }
.kpi-feux .feu {
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid rgba(0,0,0,.12);
  transition: opacity .2s;
  opacity: .25;
}
.kpi-feux .feu.is-on { opacity: 1; box-shadow: 0 0 0 4px rgba(0,0,0,.06); }
.kpi-feux__label {
  font-size: 18px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase;
  margin-left: 16px;
}

/* ───── Conseil ───── */
.conseil { max-width: 1100px; margin: 0 auto; padding: 64px 32px; }
.conseil__intro { font-size: 17px; opacity: .75; max-width: 720px; margin: 0 0 32px; line-height: 1.6; }
.conseil__filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }

.conseil__scope {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 24px;
}
.conseil__scope-btn {
  text-align: left;
  padding: 18px 22px;
  background: transparent;
  border: 1.5px solid rgba(0,0,0,.12);
  border-radius: 4px;
  transition: border-color .15s, background .15s;
}
.conseil__scope-btn:hover { background: rgba(0,0,0,.025); }
.conseil__scope-btn.is-active { border-width: 1.5px; background: rgba(0,0,0,.025); }
.conseil__scope-l {
  font-size: 16px; font-weight: 600; letter-spacing: -.005em;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 4px;
}
.conseil__scope-tag {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  padding: 3px 7px; border-radius: 2px;
  background: rgba(0,0,0,.08); color: rgba(0,0,0,.7);
}
.conseil__scope-s { font-size: 12px; opacity: .6; }

.capca-notice {
  padding: 16px 20px;
  background: rgba(0,0,0,.025);
  border-left: 3px solid var(--c-secondary);
  border-radius: 2px;
  font-size: 14px; line-height: 1.55;
  margin-bottom: 24px;
}
.capca-notice strong { font-weight: 700; }
.chip {
  padding: 8px 14px; border-radius: 4px;
  border: 1px solid rgba(0,0,0,.15); background: transparent;
  font-size: 13px; font-weight: 500;
}
.chip:hover { background: rgba(0,0,0,.04); }
.chip.is-active { font-weight: 600; }

.docs-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid rgba(0,0,0,.08); }
.doc-row {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; align-items: center;
  padding: 20px 4px;
  border-bottom: 1px solid rgba(0,0,0,.08);
  transition: background .15s;
}
.doc-row:hover { background: rgba(0,0,0,.025); padding-left: 12px; padding-right: 12px; }
.doc-row__icon {
  width: 48px; height: 56px;
  border: 1.5px solid;
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; letter-spacing: .04em;
}
.doc-row__type {
  font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  margin-bottom: 4px;
}
.doc-row__title { font-size: 17px; font-weight: 400; letter-spacing: -.005em; line-height: 1.3; }
.doc-row__meta { font-size: 12px; opacity: .55; margin-top: 4px; }
.doc-row__action { font-size: 13px; font-weight: 600; opacity: .7; }
.doc-row:hover .doc-row__action { opacity: 1; }

.conseil__next {
  margin-top: 48px;
  padding: 32px;
  background: rgba(0,0,0,.025);
  border-left: 3px solid var(--c-primary);
  border-radius: 4px;
}
.conseil__next-label {
  font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 8px;
}
.conseil__next h3 { font-size: 24px; font-weight: 400; margin: 0 0 12px; letter-spacing: -.01em; }
.conseil__next p { font-size: 15px; opacity: .75; margin: 0 0 20px; line-height: 1.5; }

/* ───── Opposition ───── */
.opposition { max-width: 1280px; margin: 0 auto; padding: 64px 32px; }
.oppo__grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  margin-bottom: 56px;
}
.oppo-card { display: flex; flex-direction: column; gap: 12px; }
.oppo-card__head { display: flex; align-items: center; justify-content: space-between; }
.oppo-card__type {
  font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 2px;
}
.oppo-card__date { font-size: 12px; opacity: .55; }
.oppo-card h3 { font-size: 19px; font-weight: 400; margin: 0; line-height: 1.3; letter-spacing: -.005em; }
.oppo-card p { font-size: 14px; opacity: .72; margin: 0; line-height: 1.55; }
.oppo-card__foot { margin-top: auto; font-size: 13px; font-weight: 600; }

.vote-record {
  padding: 40px;
  background: rgba(0,0,0,.025);
  border-radius: 4px;
}
.vote-record h3 { font-size: 28px; font-weight: 400; margin: 0 0 8px; letter-spacing: -.01em; }
.vote-record p { opacity: .75; margin: 0 0 24px; }
.vote-bars { display: flex; flex-direction: column; gap: 16px; max-width: 720px; }
.vote-bar__head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
.vote-bar__head span:first-child { font-weight: 600; }
.vote-bar__head span:last-child { opacity: .6; font-family: ui-monospace, monospace; }
.vote-bar__track { height: 6px; background: rgba(0,0,0,.08); border-radius: 2px; overflow: hidden; }
.vote-bar__track > div { height: 100%; transition: width .6s; }
.vote-record__note { margin-top: 24px; font-size: 13px; font-style: italic; opacity: .7; }

/* ───── Expression ───── */
.expression { max-width: 980px; margin: 0 auto; padding: 64px 32px; }
.expression__intro { font-size: 17px; opacity: .75; line-height: 1.6; margin: 0 0 32px; }
.expression__tabs {
  display: flex; gap: 0; border-bottom: 1px solid rgba(0,0,0,.1);
  margin-bottom: 40px;
}
.expression__tab {
  background: transparent; border: 0;
  padding: 14px 22px;
  font-size: 14px; font-weight: 500;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  color: rgba(0,0,0,.6);
}
.expression__tab.is-active { font-weight: 600; }

.testimony-form {
  border: 1px solid rgba(0,0,0,.1);
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 32px;
}
.testimony-form textarea {
  width: 100%; border: 0; outline: 0;
  font-family: inherit; font-size: 15px;
  resize: vertical; min-height: 80px;
  background: transparent;
}
.testimony-form__row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid rgba(0,0,0,.08);
}
.check { font-size: 13px; opacity: .75; display: flex; align-items: center; gap: 6px; }

.testimonies { display: flex; flex-direction: column; gap: 20px; }
.testimony {
  border: 1px solid rgba(0,0,0,.1);
  border-radius: 4px; padding: 20px 24px;
}
.testimony__head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.testimony__avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600;
}
.testimony__author { font-weight: 600; font-size: 14px; }
.testimony__meta { font-size: 12px; opacity: .55; }
.testimony p { font-size: 16px; line-height: 1.55; margin: 0 0 16px; font-style: italic; }
.testimony__foot { display: flex; align-items: center; gap: 16px; }
.testimony__vote {
  background: transparent; border: 1px solid; padding: 6px 12px; border-radius: 2px;
  font-size: 12px; font-weight: 600;
}
.testimony__reply { font-size: 12px; opacity: .6; }

/* Idées */
.ideas { display: flex; flex-direction: column; gap: 8px; }
.ideas__form {
  display: flex; gap: 12px; margin-bottom: 24px;
}
.ideas__form input {
  flex: 1; border: 1px solid rgba(0,0,0,.15); border-radius: 4px;
  padding: 12px 16px; font-family: inherit; font-size: 15px; outline: 0;
}
.idea-row {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 20px; align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid rgba(0,0,0,.08);
}
.idea-row__votes {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  min-width: 56px;
}
.idea-row__up {
  width: 32px; height: 32px; border: 1px solid; background: transparent;
  border-radius: 4px;
}
.idea-row__votes span { font-size: 18px; font-weight: 400; }
.idea-row h4 { font-size: 16px; font-weight: 400; margin: 0 0 4px; }
.idea-row__meta { font-size: 12px; opacity: .65; }
.idea-row__more { font-size: 13px; font-weight: 600; }

/* Contact */
.contact { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
.contact__form { display: flex; flex-direction: column; gap: 14px; padding: 28px; }
.contact__form h3 { font-size: 22px; font-weight: 400; margin: 0; letter-spacing: -.01em; }
.contact__form p { font-size: 14px; opacity: .7; margin: 0 0 8px; }
.contact__form label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; opacity: .75; font-weight: 500; }
.contact__form input, .contact__form select, .contact__form textarea {
  border: 1px solid rgba(0,0,0,.15);
  border-radius: 4px; padding: 10px 14px;
  font-family: inherit; font-size: 14px; outline: 0;
  background: var(--c-paper);
  color: var(--c-ink);
}
.contact__row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.contact__form .btn { align-self: flex-start; margin-top: 8px; }
.contact__side { padding: 28px 0; }
.contact__side h4 { font-size: 14px; margin: 0 0 6px; font-weight: 600; }

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch (e) {}
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<>
    <div className="twk-sect">{label}</div>
    {children}
  </>);
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakRadio, TweakSelect, TweakColor,
});
</script>

function Header({ section, setSection, palette, headingFont }) {
  const items = [
    ["accueil", "Accueil"],
    ["conseil", "Conseil municipal"],
    ["bilan", "Bilan de la majorité"],
    ["opposition", "Mon action"],
    ["expression", "Vous avez la parole"],
    ["commune", "Notre commune"],
    ["meteo", "Météo"],
    ["nous", "Qui sommes-nous"],
  ];
  return (
    <header className="site-header">
      <div className="site-header__inner">
        <a href="#" onClick={(e) => { e.preventDefault(); setSection("accueil"); }} className="site-brand">
          <BrandMark />
          <div className="site-brand__text">
            <div className="site-brand__name" style={{ fontFamily: headingFont }}>Freyssenet Ensemble</div>
            <div className="site-brand__sub">L'avenir à construire ensemble</div>
          </div>
        </a>
        <nav className="site-nav">
          {items.map(([k, l]) => (
            <button key={k} onClick={() => setSection(k)}
              className={"site-nav__item " + (section === k ? "is-active" : "")}
              style={section === k ? { color: palette[0] } : {}}>
              {l}
              {section === k && <span className="site-nav__bar" style={{ background: palette[0] }} />}
            </button>
          ))}
        </nav>
        <button className="site-cta" style={{ background: palette[2], color: palette[3] }}
          onClick={() => setSection("expression")}>
          Nous écrire →
        </button>
      </div>
    </header>
  );
}

function Hero({ palette, headingFont, setSection, tone }) {
  const titre = "Freyssenet, l'avenir à construire ensemble.";
  const intro = tone === "engage"
    ? "46 habitants, une voix qui compte. Nous publions ici tous les documents du conseil municipal, nos analyses, nos propositions, et nous donnons la parole à ceux que la majorité préfère ne pas entendre."
    : "46 habitants, une commune à faire vivre. Nous mettons à disposition les documents du conseil, nos travaux et un espace d'expression ouvert à tous les Freyssenetois.";
  return (
    <section className="hero">
      <div className="hero__grid">
        <div className="hero__left">
          <div className="hero__eyebrow" style={{ color: palette[0] }}>
            <span className="hero__pulse" style={{ background: palette[0] }} />
            Édition du 8 mai 2026 · 46 habitants · Ardèche
          </div>
          <h1 className="hero__title" style={{ fontFamily: headingFont, color: palette[2] }}>
            {titre}
          </h1>
          <p className="hero__lead">{intro}</p>
          <div className="hero__cta">
            <button className="btn btn--primary" style={{ background: palette[0] }} onClick={() => setSection("bilan")}>
              Voir le bilan de la majorité
            </button>
            <button className="btn btn--ghost" onClick={() => setSection("conseil")}>
              Consulter les documents →
            </button>
          </div>
          <div className="hero__stats">
            <Stat n="48" l="délibérations suivies" palette={palette} headingFont={headingFont} />
            <Stat n="12" l="tribunes publiées" palette={palette} headingFont={headingFont} />
            <Stat n="38" l="contributions citoyennes" palette={palette} headingFont={headingFont} />
            <Stat n="1/7" l="élu d'opposition" palette={palette} headingFont={headingFont} />
          </div>
        </div>

function Stat({ n, l, palette, headingFont }) {
  return (
    <div className="stat">
      <div className="stat__n" style={{ fontFamily: headingFont, color: palette[0] }}>{n}</div>
      <div className="stat__l">{l}</div>
    </div>
  );
}

function SectionTitle({ kicker, title, palette, headingFont }) {
  return (
    <div className="sect-title">
      <div className="sect-title__kicker" style={{ color: palette[0] }}>
        <span className="sect-title__line" style={{ background: palette[0] }} /> {kicker}
      </div>
      <h2 style={{ fontFamily: headingFont, color: palette[2] }}>{title}</h2>
    </div>
  );
}

function Actus({ palette, headingFont }) {
  return (
    <section className="actus">
      <SectionTitle kicker="À la une" title="Nos dernières publications" palette={palette} headingFont={headingFont} />
      <div className="actus__grid">
        {ACTUS.map((a, i) => (
          <article key={i} className={"card actu " + (i === 0 ? "actu--featured" : "")}>
            <div className="actu__meta">
              <span className="actu__tag" style={{ color: palette[0], borderColor: palette[0] }}>{a.tag}</span>
              <span className="actu__date">{a.date}</span>
            </div>
            <h3 style={{ fontFamily: headingFont, color: palette[2] }}>{a.title}</h3>
            <p>{a.excerpt}</p>
            <a className="actu__more" style={{ color: palette[0] }}>Lire la suite →</a>
            {i === 0 && (
              <div className="actu__hero placeholder">
                <div className="placeholder__label">photo · illustration tribune</div>
              </div>
            )}
          </article>
        ))}
      </div>
    </section>
  );
}

function KPI({ palette, headingFont, format }) {
  const [mandat, setMandat] = useState("2020");
  const m = MANDATS[mandat];
  return (
    <section className="bilan">
      <SectionTitle kicker={"Bilan de la majorité — " + m.label.toLowerCase()}
        title="Promesses tenues, promesses oubliées." palette={palette} headingFont={headingFont} />

      <div className="mandat-switch">
        {Object.entries(MANDATS).map(([k, v]) => (
          <button key={k}
            className={"mandat-switch__btn " + (mandat === k ? "is-active" : "")}
            onClick={() => setMandat(k)}
            style={mandat === k ? { borderColor: palette[0], color: palette[0] } : {}}>
            <div className="mandat-switch__l" style={{ fontFamily: headingFont }}>{v.label}</div>
            <div className="mandat-switch__s">{v.sub}</div>
          </button>
        ))}
      </div>

      <p className="bilan__intro">
        Notre méthode : pour chaque engagement public de la majorité, nous mesurons l'écart entre la promesse et la réalisation effective au {new Date().toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" })}. {m.source}
      </p>

      <div className="bilan__legend">
        <LegendItem c={palette[1]} l="Tenu (≥80%)" />
        <LegendItem c="#c9a227" l="En cours (50–79%)" />
        <LegendItem c="#d97706" l="En retard (20–49%)" />
        <LegendItem c={palette[0]} l="Non tenu (<20%)" />
      </div>

      <div className="bilan__list">
        {m.kpis.map((k, i) => (
          <KPICard key={mandat + i} k={k} palette={palette} headingFont={headingFont} format={format} idx={i} />
        ))}
      </div>
    </section>
  );
}

function LegendItem({ c, l }) {
  return <div className="legend-item"><span style={{ background: c }} /> {l}</div>;
}

function KPICard({ k, palette, headingFont, format, idx }) {
  const color = statutColor(k.statut, palette);
  return (
    <article className="kpi-card">
      <div className="kpi-card__head">
        <div className="kpi-card__num" style={{ fontFamily: headingFont, color: palette[0] }}>
          {String(idx + 1).padStart(2, "0")}
        </div>
        <div className="kpi-card__title">
          <h3 style={{ fontFamily: headingFont, color: palette[2] }}>{k.theme}</h3>
          <p>« {k.promesse} »</p>
        </div>
        <div className="kpi-card__badge" style={{ color, borderColor: color }}>
          {statutLabel(k.statut)}
        </div>
      </div>

      {format === "jauges" && (
        <div className="kpi-gauge">
          <div className="kpi-gauge__row">
            <span>Promesse</span>
            <div className="kpi-gauge__bar"><div style={{ width: "100%", background: "rgba(0,0,0,.12)" }} /></div>
            <span className="kpi-gauge__val">100%</span>
          </div>
          <div className="kpi-gauge__row">
            <span>Réalisé</span>
            <div className="kpi-gauge__bar"><div style={{ width: `${k.realise}%`, background: color }} /></div>
            <span className="kpi-gauge__val" style={{ color, fontWeight: 600 }}>{k.realise}%</span>
          </div>
        </div>
      )}

      {format === "notes" && (
        <div className="kpi-note">
          <div className="kpi-note__big" style={{ fontFamily: headingFont, color }}>
            {Math.round(k.realise / 10)}<span>/10</span>
          </div>
          <div className="kpi-note__bars">
            {[...Array(10)].map((_, i) => (
              <span key={i} style={{ background: i < Math.round(k.realise / 10) ? color : "rgba(0,0,0,.08)" }} />
            ))}
          </div>
        </div>
      )}

      {format === "feux" && (
        <div className="kpi-feux">
          <div className={"feu " + (k.statut === "ok" ? "is-on" : "")} style={{ background: k.statut === "ok" ? palette[1] : "rgba(0,0,0,.08)" }} />
          <div className={"feu " + (k.statut === "encours" || k.statut === "retard" ? "is-on" : "")} style={{ background: (k.statut === "encours" || k.statut === "retard") ? "#d97706" : "rgba(0,0,0,.08)" }} />
          <div className={"feu " + (k.statut === "alerte" ? "is-on" : "")} style={{ background: k.statut === "alerte" ? palette[0] : "rgba(0,0,0,.08)" }} />
          <div className="kpi-feux__label" style={{ color }}>{statutLabel(k.statut)}</div>
        </div>
      )}

      <p className="kpi-card__detail">{k.detail}</p>
    </article>
  );
}

function Conseil({ palette, headingFont }) {
  const [scope, setScope] = useState("municipal");
  const docs = scope === "municipal" ? DOCS_CONSEIL : DOCS_CAPCA;
  return (
    <section className="conseil">
      <SectionTitle kicker="Documents officiels" title="Tous les documents des conseils." palette={palette} headingFont={headingFont} />
      <p className="conseil__intro">
        Convocations, ordres du jour, procès-verbaux, délibérations et budgets : tout ce qui devrait être public, l'est ici. Les documents sont publiés dès leur réception, sans filtre.
      </p>

      <div className="conseil__scope">
        <button
          className={"conseil__scope-btn " + (scope === "municipal" ? "is-active" : "")}
          onClick={() => setScope("municipal")}
          style={scope === "municipal" ? { borderColor: palette[0], color: palette[0] } : {}}>
          <div className="conseil__scope-l">Conseil municipal</div>
          <div className="conseil__scope-s">Commune de Freyssenet · 7 conseillers</div>
        </button>
        <button
          className={"conseil__scope-btn " + (scope === "capca" ? "is-active" : "")}
          onClick={() => setScope("capca")}
          style={scope === "capca" ? { borderColor: palette[0], color: palette[0] } : {}}>
          <div className="conseil__scope-l">Conseil communautaire <span className="conseil__scope-tag">CAPCA</span></div>
          <div className="conseil__scope-s">Communauté d'Agglomération Privas Centre Ardèche</div>
        </button>
      </div>

      {scope === "capca" && (
        <div className="capca-notice">
          <strong>À propos de la CAPCA</strong> — La Communauté d'Agglomération Privas Centre Ardèche regroupe 42 communes dont Freyssenet. Elle exerce des compétences essentielles pour notre quotidien : eau, assainissement, déchets, urbanisme, mobilités, développement économique. Trop souvent ignorée des habitants, c'est pourtant là que se prennent des décisions qui nous touchent directement.
        </div>
      )}

function Meteo({ palette, headingFont }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(null);
  useEffect(() => {
    const url = "https://api.open-meteo.com/v1/forecast?latitude=44.65&longitude=4.55&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=Europe%2FParis&forecast_days=7";
    fetch(url).then(r => r.json()).then(setData).catch(e => setErr(String(e)));
  }, []);

  const codeLabel = (c) => {
    if (c == null) return "—";
    if (c === 0) return "Ciel dégagé";
    if (c <= 3) return "Partiellement nuageux";
    if (c <= 48) return "Brouillard";
    if (c <= 67) return "Pluie";
    if (c <= 77) return "Neige";
    if (c <= 82) return "Averses";
    if (c <= 99) return "Orages";
    return "—";
  };
  const codeIcon = (c) => {
    if (c == null) return "—";
    if (c === 0) return "☀";
    if (c <= 3) return "⛅";
    if (c <= 48) return "🌫";
    if (c <= 67) return "🌧";
    if (c <= 77) return "❄";
    if (c <= 82) return "🌦";
    return "⛈";
  };
  const days = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];

  return (
    <section className="meteo-sect">
      <SectionTitle kicker="Météo de Freyssenet" title="Le ciel sur le Coiron, en direct." palette={palette} headingFont={headingFont} />
      <p className="meteo-sect__intro">
        Données ouvertes Open-Meteo, mises à jour toutes les heures. Coordonnées : 44,65° N — 4,55° E, altitude 800 m env.
      </p>
      {err && <div className="meteo-err">Données indisponibles : {err}</div>}
      {!data && !err && <div className="meteo-load">Chargement des relevés…</div>}
      {data && (
        <>
          <div className="meteo-now card">
            <div className="meteo-now__main">
              <div className="meteo-now__icon" style={{ color: palette[0] }}>{codeIcon(data.current.weather_code)}</div>
              <div>
                <div className="meteo-now__t" style={{ fontFamily: headingFont, color: palette[2] }}>
                  {Math.round(data.current.temperature_2m)}<span>°C</span>
                </div>
                <div className="meteo-now__l">{codeLabel(data.current.weather_code)} · ressenti {Math.round(data.current.apparent_temperature)}°</div>
              </div>
            </div>
            <div className="meteo-now__side">
              <Metric l="Humidité" v={data.current.relative_humidity_2m + " %"} headingFont={headingFont} />
              <Metric l="Vent" v={Math.round(data.current.wind_speed_10m) + " km/h"} headingFont={headingFont} />
              <Metric l="Direction" v={data.current.wind_direction_10m + "°"} headingFont={headingFont} />
            </div>
          </div>
          <h3 className="meteo-fc__h" style={{ fontFamily: headingFont, color: palette[2] }}>Prévisions à 7 jours</h3>
          <div className="meteo-fc">
            {data.daily.time.map((d, i) => {
              const dd = new Date(d);
              return (
                <div key={d} className="meteo-fc__d">
                  <div className="meteo-fc__day">{days[dd.getDay()]} {dd.getDate()}</div>
                  <div className="meteo-fc__icon" style={{ color: palette[0] }}>{codeIcon(data.daily.weather_code[i])}</div>
                  <div className="meteo-fc__t" style={{ fontFamily: headingFont }}>
                    <b>{Math.round(data.daily.temperature_2m_max[i])}°</b>
                    <span>{Math.round(data.daily.temperature_2m_min[i])}°</span>
                  </div>
                  <div className="meteo-fc__rain">{data.daily.precipitation_sum[i]?.toFixed(1) || 0} mm</div>
                </div>
              );
            })}
          </div>
          <p className="meteo-note">
            <b>À propos de l'API.</b> Le module Python <i>meteociel_api</i> (Github : Meteo-API/meteociel_api) nécessite un serveur ; ce site étant statique, nous utilisons Open-Meteo, libre et gratuite, qui couvre Freyssenet avec la même qualité de données. Une bascule vers Meteociel sera possible si vous mettez en place un mini-serveur.
          </p>
        </>
      )}
    </section>
  );
}

          options={[
            ["#8b2635", "#4a5d3a", "#1a1a1a", "#fafaf7"],
            ["#1e3a5f", "#b8956a", "#1a1a1a", "#fafafa"],
            ["#2d4a3e", "#c4633f", "#1a1a1a", "#f5f1e8"],
            ["#3d3024", "#a87d4f", "#1a1a1a", "#f0ede4"],
            ["#0d3b66", "#d62828", "#1a1a1a", "#ffffff"],
            ["#1a1a1a", "#c9a227", "#0a0a0a", "#f5f5f0"],
          ]}
          onChange={(v) => setTweak("palette", v)} />

        <TweakSection label="Typographie" />
        <TweakSelect label="Titres" value={t.headingFont}
          options={["Instrument Serif", "Fraunces", "Cormorant Garamond", "Playfair Display", "Public Sans"]}
          onChange={(v) => setTweak("headingFont", v)} />
        <TweakSelect label="Corps" value={t.bodyFont}
          options={["Public Sans", "Inter", "IBM Plex Sans", "Source Sans 3", "Work Sans"]}
          onChange={(v) => setTweak("bodyFont", v)} />

        <TweakSection label="Indicateurs (Bilan)" />
        <TweakRadio label="Format" value={t.kpiFormat}
          options={["jauges", "notes", "feux"]}
          onChange={(v) => setTweak("kpiFormat", v)} />

        <TweakSection label="Cartes" />
        <TweakRadio label="Style" value={t.cardStyle}
          options={["bordered", "shadow", "filled"]}
          onChange={(v) => setTweak("cardStyle", v)} />

        <TweakSection label="Ton éditorial" />
        <TweakRadio label="Ton" value={t.tone}
          options={["engage", "institutionnel"]}
          onChange={(v) => setTweak("tone", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
